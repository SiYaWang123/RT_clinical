<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 臨床評核系統 - TBI 專題</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; --success-color: #27ae60; --error-color: #e74c3c; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: var(--accent-color); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        
        /* 測驗樣式 */
        .option-btn { background-color: white; color: var(--primary-color); border: 2px solid #eee; margin-bottom: 10px; text-align: left; line-height: 1.4; }
        .option-btn.correct { background-color: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .option-btn.wrong { background-color: var(--error-color) !important; color: white; border-color: var(--error-color); }
        
        #explanation-box { margin-top: 15px; padding: 15px; background-color: #e8f4fd; border-left: 5px solid var(--accent-color); border-radius: 5px; line-height: 1.6; }

        /* 報告專用樣式 */
        .report-item { border-bottom: 1px solid #eee; padding: 15px 0; page-break-inside: avoid; }
        .report-q { font-weight: bold; margin-bottom: 8px; color: var(--primary-color); }
        .report-ans { font-size: 0.9rem; margin-bottom: 5px; }
        .report-exp { font-size: 0.85rem; color: #555; background: #f0f7ff; padding: 10px; border-radius: 4px; border: 1px solid #d0e7ff; margin-top: 5px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 5px; color: white; font-weight: bold; }
        .tag-correct { background: var(--success-color); }
        .tag-wrong { background: var(--error-color); }
        
        #download-btn { background-color: #9b59b6; font-weight: bold; border: 2px solid #8e44ad; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2 style="text-align:center;">🏥 RT 臨床技術評核預習</h2>
        <h4 style="text-align:center; color:#34495e;">主題：腦外傷 (TBI) 呼吸照護</h4>
        <p style="text-align:center; color:#7f8c8d; font-size: 0.9rem;">請輸入個人資料後開始測驗</p>
        <input type="text" id="name" placeholder="學生姓名">
        <input type="text" id="student-id" placeholder="學號">
        <button id="start-btn">進入測驗</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="progress-text" style="color: #7f8c8d; font-size: 0.85rem; font-weight: bold;"></div>
        <h3 id="question-text" style="margin: 15px 0; font-size: 1.1rem; line-height: 1.5;"></h3>
        <div id="options-container"></div>
        <div id="explanation-box" class="hidden">
            <p id="explanation-text" style="margin:0;"></p>
            <button id="next-btn">下一題</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <div id="report-area" style="background: white; padding: 25px; border: 1px solid #ddd; border-radius: 10px;">
            <h2 style="text-align:center; color: var(--primary-color); margin-top:0;">📋 RT 臨床教學評核報告</h2>
            <div id="student-info-display" style="border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 15px; font-size: 1rem;"></div>
            <div id="report-content"></div>
            <p style="text-align:right; font-size:0.75rem; color:#999; margin-top: 20px;" id="report-time"></p>
        </div>
        
        <button id="download-btn">📸 生成完整報告圖片 (傳給老師)</button>
        <button onclick="location.reload()" style="background:#95a5a6; margin-top: 10px;">重新練習</button>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const quizData = [
        {
            q: "第一部分：知識面-關於腦外傷急性期的致病機轉與治療原則，下列敘述何者正確？",
            options: ["(A) 為降低腦壓，應例行性將 PaCO2 維持在 25mmHg 以下。", "(B) PaCO2 升高會導致腦血管舒張，進而可能增加顱內壓 (ICP)。", "(C) 腦外傷病人不會發生肺水腫，因此不需要監測肺部物理檢查。", "(D) 只要血氧飽和度 SpO2 大於 90%，PaO2的數值並不重要。"],
            correct: 1,
            exp: "根據 BTF 指南，PaCO2 是強力的腦血管調節因子。升高會引發血管舒張，增加腦血流體積使 ICP 惡化。臨床通常維持在 35-45 mmHg。"
        },
        {
            q: "第二部分：技能面-你正在為一名 ICP 持續維持在 22 mmHg 的病人設定呼吸器，下列 PEEP 的運用何者最為適當？",
            options: ["(A) 為了保護肺部，應直接給予 PEEP > 15 cmH2O。", "(B) 只要 ICP 高，PEEP 就必須設定為 0。", "(C) PEEP 可能阻礙靜脈回流導致 ICP 升高，應在維持氧合下使用最低有效 PEEP 並嚴密監測。", "(D) PEEP 只會影響肺部，完全不會影響腦壓。"],
            correct: 2,
            exp: "高 PEEP 會增加胸內壓並阻礙頸靜脈回流。臨床需在改善缺氧與維持腦壓間取得平衡，採最低有效 PEEP。"
        },
        {
            q: "第二部分：技能面-抽痰過程中病人 ICP 從 18 mmHg 飆升至 35 mmHg且對抗呼吸器，你的首要處置為何？",
            options: ["(A) 不必理會，抽完痰 ICP 自然會降。", "(B) 立即停止抽痰，給予 100% 氧氣，評估是否加強鎮靜或過度通氣預處理。", "(C) 調高呼吸器的壓力限制報警值，繼續完成操作。", "(D) 立即將呼吸器管路脫開。"],
            correct: 1,
            exp: "抽痰會引發咳嗽與交感神經興奮導致 ICP 劇增。應立即停止刺激並給予足夠鎮靜與氧合，避免二次腦損傷。"
        },
        {
            q: "第三部分：態度面-病人 PaCO2 升至 50mmHg 導致 ICP 升至 25mmHg。下列哪種 SBAR 報告方式最專業？",
            options: ["(A) 「醫師，病人的腦壓好像怪怪的，你要不要來看一下？」", "(B) 「醫師，我是 RT，病人剛剛 CO2 變高了，所以我調快了呼吸速率。」", "(C) 「(S)10床ICP升至25；(B)原正常但目前PaCO2 50；(A)我認為是CO2蓄積導致；(R)建議增加通氣量，您覺得如何？」", "(D) 靜靜地寫在紀錄上，等醫師巡房再說。"],
            correct: 2,
            exp: "專業 RT 應具備主動發現並分析問題的能力。SBAR 能最有效率地在忙碌臨床環境中完成精準溝通。"
        },
        {
            q: "第四部分：監測與判讀-病人 MAP 70mmHg、ICP 20mmHg。其腦灌注壓 (CPP) 為何？對 RT 計劃有何影響？",
            options: ["(A) CPP = 90mmHg，灌注極佳，可積極進行呼吸道清除動作。", "(B) CPP = 50mmHg，灌注不足，應避免升高 ICP 的操作並報告醫師。", "(C) CPP = 3.5mmHg，數值錯誤，不需理會。", "(D) 只要 ICP 小於 20，CPP 的數值並不重要。"],
            correct: 1,
            exp: "CPP = MAP - ICP (70-20=50)。BTF 建議應維持在 60-70 mmHg。50 代表灌注不足，腦缺血風險高，應減少刺激。"
        },
        {
            q: "第五部分：新病人初始設定-為疑似腦疝脫 (Herniation) 病人插管時協助「短暫」過度通氣，目標 PaCO2 應設為？",
            options: ["(A) 45-55mmHg(高碳酸血症)", "(B) 35-44mmHg (正常碳酸血症)", "(C) 30-35mmHg (輕度低碳酸血症)", "(D) 20-25mmHg (極度低碳酸血症)"],
            correct: 2,
            exp: "急性腦疝脫時可「短暫」通氣救命，目標為 30-35 mmHg。除非萬不得已，不應降至 25 以下以防嚴重腦缺血。"
        },
        {
            q: "第六部分：呼吸問題擬定-TBI 病人併發 ARDS 實施肺保護策略導致 CO2 蓄積時，RT 應如何擬定計畫？",
            options: ["(A) 優先保護肺部，不管 CO2 升高多少。", "(B) 優先保護大腦，放棄低潮氣量策略，給予大潮氣量排空 CO2。", "(C) 必須權衡兩者，在維持 ICP < 20 的前提下盡量調低 VT，密切監測 ABG。", "(D) 直接將氧氣濃度調至 100% 即可。"],
            correct: 2,
            exp: "「肺腦天平」：TBI 病人不能盲目採取允許性高碳酸血症。須在維持腦壓安全範圍內盡力執行肺保護策略。"
        },
        {
            q: "第七部分：專業態度-GCS 6分且咳嗽極差、痰黏稠病人醫師欲拔管。身為 RT 最專業的做法為何？",
            options: ["(A) 醫師說拔就拔，RT 只負責執行。", "(B) 尊重醫師但主動提供評估數據（如 Cough flow、GCS），並表達對拔管風險擔憂。", "(C) 為了展現態度，直接在病歷上寫「醫師判斷錯誤」。", "(D) 拔管前不說話，等失敗後再提醒醫師。"],
            correct: 1,
            exp: "GCS < 8 是拔管失敗強預測指標。RT 應提供呼吸動力學與風險評估數據，專業態度包含尊重與提供實證建議。"
        }
    ];

    let currentIdx = 0;
    let name = "";
    let sid = "";
    let userRecords = [];

    document.getElementById('start-btn').addEventListener('click', function() {
        name = document.getElementById('name').value.trim();
        sid = document.getElementById('student-id').value.trim();
        if (!name || !sid) { alert("請完整填寫姓名與學號"); return; }
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    });

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('progress-text').innerText = `問題 ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        document.getElementById('explanation-box').classList.add('hidden');

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        const q = quizData[currentIdx];
        const isCorrect = (selected === q.correct);
        
        userRecords.push({
            question: q.q,
            userAns: q.options[selected],
            correctAns: q.options[q.correct],
            isCorrect: isCorrect,
            exp: q.exp
        });

        const btns = document.querySelectorAll('.option-btn');
        if (isCorrect) {
            btns[selected].classList.add('correct');
        } else {
            btns[selected].classList.add('wrong');
            btns[q.correct].classList.add('correct');
        }

        document.getElementById('explanation-text').innerHTML = `<strong>${isCorrect ? '✅ 答對了！' : '❌ 答錯了'}</strong><br>${q.exp}`;
        document.getElementById('explanation-box').classList.remove('hidden');
        btns.forEach(b => b.disabled = true);
    }

    document.getElementById('next-btn').onclick = function() {
        currentIdx++;
        if (currentIdx < quizData.length) { showQuestion(); } 
        else { showFinalReport(); }
    };

    function showFinalReport() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const score = userRecords.filter(r => r.isCorrect).length;
        document.getElementById('student-info-display').innerHTML = `
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>學生：</strong>${name} <br>
                    <strong>學號：</strong>${sid}
                </div>
                <div style="text-align:right;">
                    <span style="font-size: 1.2rem; font-weight:bold; color:var(--accent-color);">得分：${score} / ${quizData.length}</span>
                </div>
            </div>
        `;

        const content = document.getElementById('report-content');
        content.innerHTML = "";
        userRecords.forEach((r, idx) => {
            content.innerHTML += `
                <div class="report-item">
                    <div class="report-q">${idx + 1}. ${r.question}</div>
                    <div class="report-ans">
                        <span class="tag ${r.isCorrect ? 'tag-correct' : 'tag-wrong'}">${r.isCorrect ? 'Correct' : 'Incorrect'}</span>
                        選擇：${r.userAns}
                    </div>
                    ${!r.isCorrect ? `<div class="report-ans" style="color:var(--success-color); font-weight:bold;">➜ 正解：${r.correctAns}</div>` : ''}
                    <div class="report-exp">💡 臨床解析：${r.exp}</div>
                </div>
            `;
        });
        document.getElementById('report-time').innerText = "評核時間：" + new Date().toLocaleString();
    }

    // 生成圖片按鈕
    document.getElementById('download-btn').onclick = function() {
        const btn = this;
        const reportArea = document.getElementById('report-area');
        btn.innerText = "⏳ 報告圖片生成中...";
        btn.disabled = true;

        html2canvas(reportArea, {
            scale: 2,
            backgroundColor: "#ffffff",
            scrollX: 0,
            scrollY: -window.scrollY
        }).then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL("image/png");
            link.download = `RT評核報告_${name}_${sid}.png`;
            link.click();
            btn.innerText = "📸 生成完整報告圖片 (傳給老師)";
            btn.disabled = false;
        });
    };
});
</script>
</body>
</html>
