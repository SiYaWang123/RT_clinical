<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT 臨床評核預習系統 - 腦外傷病人</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        h2 { color: var(--primary-color); text-align: center; }
        
        .hidden { display: none; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; }

        .option-btn {
            background-color: white;
            color: var(--primary-color);
            border: 2px solid #eee;
            margin-bottom: 10px;
            text-align: left;
        }

        .option-btn.correct { background-color: var(--success-color) !important; color: white; }
        .option-btn.wrong { background-color: var(--error-color) !important; color: white; }

        #explanation-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #e8f4fd;
            border-left: 5px solid var(--accent-color);
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .progress {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .result-info {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h2>🏥 實習生技術評核預習系統</h2>
        <p style="text-align:center; color: #666;">請輸入基本資料開始測驗</p>
        <input type="text" id="name" placeholder="學生姓名">
        <input type="text" id="student-id" placeholder="學號">
        <button onclick="startQuiz()">進入測驗</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress" id="progress-text">問題 1 / 8</div>
        <div id="question-text" style="font-weight: bold; margin-bottom: 15px;"></div>
        <div id="options-container"></div>
        <div id="explanation-box" class="hidden">
            <strong>💡 老師解析：</strong>
            <p id="explanation-text"></p>
            <button id="next-btn" onclick="nextQuestion()">下一題</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>🎉 預習完成！</h2>
        <div class="result-info">
            <p><strong>姓名：</strong><span id="res-name"></span></p>
            <p><strong>學號：</strong><span id="res-id"></span></p>
            <p><strong>測驗日期：</strong><span id="res-date"></span></p>
        </div>
        <p id="score-summary" style="text-align:center; font-size: 1.5rem; color: var(--success-color); font-weight: bold;"></p>
        <p style="text-align:center; color: #e74c3c; font-size: 0.9rem;">⚠️ 請截圖此畫面，並找老師進行臨床評核。</p>
        <button onclick="location.reload()">重新練習</button>
    </div>
</div>
